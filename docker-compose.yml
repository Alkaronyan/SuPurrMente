services:
  # Un único contenedor con tres procesos (supervisord, usuarios separados):
  #   - oauth2-proxy (usuario 'oauth')      → único puerto publicado (4180)
  #   - datasette    (usuario 'datasette')  → 127.0.0.1:8081 (solo vía proxy)
  #   - tracker      (usuario 'tracker')    → 127.0.0.1:8082 (/whisker-login + scheduler)
  #
  # NPM apunta TODO a este 4180. El .env (descifrado) se monta como fichero: el
  # entrypoint lo reparte en secretos 600 por usuario; NO se inyecta como env global
  # (eso lo verían todos los procesos).
  supurrmente:
    build: ./app
    volumes:
      # /data es LOCAL (bind en el host): SQLite + CSV vivos. NO se monta el NAS aquí
      # (SQLite sobre NFS se corrompe). La copia de seguridad se EMPUJA al NAS por SSH
      # desde el job de backup (ver app/src/backup.py y docs/DEPLOY.md).
      - ./data:/data
      - ./app/config.yml:/app/config.yml
      - ./.env:/app/.env:ro
    ports:
      - "4180:4180"
    restart: unless-stopped
