# Configuración NO secreta de oauth2-proxy. Los secretos (client_id, client_secret,
# cookie_secret, redirect_url) llegan por variables OAUTH2_PROXY_* (env, fichero 600).
#
# oauth2-proxy es la ÚNICA puerta de entrada (único puerto publicado). Reparte por path:
#   /whisker-login  → tracker  (uvicorn, 127.0.0.1:8082)   [requiere login]
#   resto           → datasette(127.0.0.1:8081)            [público o login según ruta]
#
# El límite público/privado vive aquí (skip_auth_routes). tests/test_oauth_routes.py
# verifica que sea una allow-list estricta. Regex sin '\' (TOML-safe): se usa [.] para
# el punto literal.

provider = "google"
email_domains = ["gonzalez.team"]
http_address = "0.0.0.0:4180"
reverse_proxy = true
cookie_secure = true
skip_provider_button = true
proxy_prefix = "/oauth2"

upstreams = [
    "http://127.0.0.1:8082/whisker-login",
    "http://127.0.0.1:8081/"
]

# Rutas PÚBLICAS (sin login): dashboard, estáticos, favicon y las 3 canned queries .json
# que alimentan los gráficos. Todo lo demás (tablas, SQL, /weights, /-/, /whisker-login)
# exige login @gonzalez.team.
skip_auth_routes = [
    "GET=^/$",
    "GET=^/favicon[.]ico$",
    "GET=^/static/",
    "GET=^/weights/cat_daily[.]json",
    "GET=^/weights/box_daily[.]json",
    "GET=^/weights/robot_status[.]json"
]
